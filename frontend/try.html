<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paw & Moods | Try Again</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
  <script>
    if (!sessionStorage.getItem("pawMoodsRewardAccess")) {
      window.location.replace("index.html");
    }
  </script>
<script>if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark-mode");</script></head>

<body data-page="try" style="opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
  <main class="page-wrap fade-in">
    <section class="card result-card">
      <p class="eyebrow"><span class="brand-text"></span></p>
      <h1>Aww… not this time 🥺💜</h1>
      <p class="subtitle">But here’s a little gift for you!</p>

      <div class="reward-box">
        <p>Get <strong id="dynamicValue">10</strong>% OFF your next order</p>
        <p class="highlight" id="dynamicMessage">You get 10% OFF</p>
        <p class="code-tag">Code: <span id="savedCode">--</span></p>
      </div>

      <div class="conditions">
        <p id="minOrderDisplay">📌 Minimum order Rs. 2000</p>
        <p id="validDaysDisplay">⏳ Valid for 48 hours</p>
      </div>

      <ol class="steps-list">
        <li>Click <strong>Shop Now</strong></li>
        <li>Choose your items</li>
        <li>Apply your discount code</li>
        <li>Complete your order</li>
      </ol>

      <div class="button-row" style="flex-wrap: wrap; gap: 10px;">
        <a class="btn btn-primary" id="shopNowBtn" href="#" aria-label="Shop Now">Shop Now</a>
        <a class="btn btn-secondary" id="discountBtn" href="#">Get Discount via WhatsApp 💸</a>
        <button class="btn btn-secondary" id="copyMessageBtn" style="flex: 1 1 100%; border: 1px dashed var(--purple-400); background: transparent; color: var(--purple-600);">📋 Copy Message To Clipboard</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
