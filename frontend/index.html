<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paw & Moods | Unlock Your Surprise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
</head>

<body data-page="home">
  <main class="page-wrap fade-in">
    <section class="card code-card">
      <p class="eyebrow"><span class="brand-text"></span></p>
      <h1>Unlock Your Surprise 💜</h1>
      <p class="subtitle">Enter your reward code to see what you got</p>
      <p id="minOrderText" class="subtitle" style="font-size: 0.85rem; margin-top: -10px; opacity: 0.8; height: 20px;"></p>

      <form id="codeForm" class="code-form" novalidate>
        <label for="rewardCode" class="sr-only">Enter reward code</label>
        <input id="rewardCode" name="rewardCode" type="text" maxlength="18" autocomplete="off"
          placeholder="e.g. PM26-ST01-W0105" required />
        <button type="submit">Reveal My Reward</button>
      </form>

      <p id="errorMessage" class="error-message" aria-live="polite"></p>
    </section>

    <a href="admin.html" class="floating-admin-btn" title="Admin Access">
      ⚙️
    </a>
  </main>

  <script src="script.js"></script>
</body>

</html>
